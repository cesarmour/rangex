[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/analyze-target"
  to = "/.netlify/functions/analyze-target"
  status = 200

[[redirects]]
  from = "/api/diagnose-shooting"
  to = "/.netlify/functions/diagnose-shooting"
  status = 200

[[redirects]]
  from = "/api/find-ranges"
  to = "/.netlify/functions/find-ranges"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
