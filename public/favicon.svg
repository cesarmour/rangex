<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" fill="#000000"/>
  <g stroke="#d8d8d8" stroke-width="0.9" fill="none" stroke-linecap="round">
    <!-- Outer arcs (4 quarter arcs) -->
    <path d="M 12 32 A 20 20 0 0 1 18 18"/>
    <path d="M 46 18 A 20 20 0 0 1 52 32"/>
    <path d="M 52 32 A 20 20 0 0 1 46 46"/>
    <path d="M 18 46 A 20 20 0 0 1 12 32"/>
    <!-- Inner small arcs (two upper quadrants forming a half circle) -->
    <path d="M 24 32 A 8 8 0 0 1 32 24"/>
    <path d="M 40 32 A 8 8 0 0 0 32 24"/>
    <!-- Cardinal ticks -->
    <line x1="32" y1="6" x2="32" y2="14"/>
    <line x1="32" y1="50" x2="32" y2="58"/>
    <line x1="6" y1="32" x2="14" y2="32"/>
    <line x1="50" y1="32" x2="58" y2="32"/>
    <!-- Diagonal X -->
    <line x1="14" y1="14" x2="50" y2="50"/>
    <line x1="50" y1="14" x2="14" y2="50"/>
  </g>
</svg>
